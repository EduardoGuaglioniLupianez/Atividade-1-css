<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>
<style>
	.card {
		width: 500px;
		height: fit-content;
		background-color: aliceblue;
		border: solid 2px navy;
		margin: 100px;
		padding: 40px;
	}

	.border {
		border-radius: 20px;
		border: solid 2px green;
	}

	.icone1 {
		width: 100px;
		height: 100px;
		border-radius: 25%;
		background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
		background-size: cover;
	}

	.text {
		font-family: Arial, Helvetica, sans-serif;
	}

	.title {
		font-size: 28px;
	}

	.maincolor {
		color: navy;
		font-style: italic;
	}

	.p {
		font-size: 15px;
	}

	.italic {
		font-style: italic;



	}

	.icone2 {
		width: 100px;
		height: 100px;
		border-radius: 25%;
		background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
		background-size: cover;
	}
</style>

<body>

	<div class="card border">
		<div class="icone1"></div>
		<div>
			<h1 class="text title">
				Meu nome é: <span style="color: navy;">Adriana</span>
			</h1>

			<p class="text" >
				<span class="maincolor italic"> Mensagem: A vida não é um morango! E ta tudo bem!</span>
			</p>
		</div>
	</div>

	<div class="card border">

		<div class="icone2">
		</div>

		<div>
			<h1 class="text title">
				Meu nome é: <span class="maincolor text">Hugo</span>
			</h1>

			<p class="text">
				<span class=" maincolor text"> Mensagem: Um dia é da caça, o outro é do caçador.</span>
				</span>
			</p>
		</div>
	</div>

</body>

</html>
